<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Balloon Shooter</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    #fps-game-canvas {
      display: block;
      margin: 0 auto;
      background: #333;
      border: 2px solid #00ff99;
      box-shadow: 0 0 24px #00ff99;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    #fps-ui {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 24px;
      font-size: 1.2em;
      background: rgba(0,0,0,0.5);
      padding: 8px 24px;
      border-radius: 12px;
      box-shadow: 0 0 8px #00ff99;
      min-width: 180px;
      max-width: 90vw;
      flex-wrap: wrap;
      justify-content: center;
    }
    #fps-shoot-btn {
      position: absolute;
      bottom: 32px;
      right: 32px;
      z-index: 20;
      padding: 18px 32px;
      font-size: 1.3em;
      background: linear-gradient(90deg,#00ff99,#fff700);
      color: #222;
      border: none;
      border-radius: 16px;
      box-shadow: 0 0 8px #00ff99;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
      display: none;
    }
    @media (max-width: 900px) {
      #fps-ui {
        font-size: 1em;
        padding: 6px 12px;
        gap: 12px;
      }
      #fps-shoot-btn {
        display: block;
        font-size: 1em;
        padding: 12px 18px;
        bottom: 16px;
        right: 16px;
      }
    }
    @media (max-width: 600px) {
      #fps-ui {
        font-size: 0.9em;
        padding: 4px 6px;
        gap: 6px;
      }
      #fps-shoot-btn {
        display: block;
        font-size: 0.9em;
        padding: 8px 12px;
        bottom: 8px;
        right: 8px;
      }
    }
  </style>
</head>
<body>
  <div id="fps-ui">
    <span>Score: <span id="fps-score">0</span></span>
    <span>Time: <span id="fps-timer">00:00</span></span>
  </div>
  <canvas id="fps-game-canvas"></canvas>
  <button id="fps-shoot-btn">Shoot</button>
  <script src="js/fps-game.js"></script>
</body>
</html>
