<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FPS Balloon Shooter</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      overflow: hidden;
    }
    #fps-game-canvas {
      display: block;
      margin: 0 auto;
      background: #333;
      border: 2px solid #00ff99;
      box-shadow: 0 0 24px #00ff99;
      width: 100vw;
      height: 100vh;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
      position: absolute;
      top: 0;
      left: 0;
    }
    #fps-ui {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      gap: 24px;
      font-size: 1.2em;
      background: rgba(0,0,0,0.5);
      padding: 8px 24px;
      border-radius: 12px;
      box-shadow: 0 0 8px #00ff99;
      min-width: 180px;
      max-width: 90vw;
      flex-wrap: wrap;
      justify-content: center;
    }
    #fps-exit-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      padding: 8px 16px;
      background: #ff4444;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
    }
    @media (max-width: 900px) {
      #fps-ui {
        font-size: 1em;
        padding: 6px 12px;
        gap: 12px;
      }
    }
    @media (max-width: 600px) {
      #fps-ui {
        font-size: 0.9em;
        padding: 4px 6px;
        gap: 6px;
      }
      #fps-exit-btn {
        padding: 6px 12px;
        font-size: 0.9em;
      }
    }
  </style>
</head>
<body>
  <a id="fps-exit-btn" href="index.html">Exit</a>
  <div id="fps-ui">
    <span><span id="label-score">Score:</span> <span id="fps-score">0</span></span>
    <span><span id="label-time">Time:</span> <span id="fps-timer">00:00</span></span>
  </div>
  <canvas id="fps-game-canvas"></canvas>
  <script src="js/fps-game.js"></script>
  <script>
    const fpsLangData = {
      th: {
        score: 'คะแนน:',
        time: 'เวลา:',
        exit: 'ออกเกม',
        gameOverBomb: 'ว้า โดนระเบิด! หัก 10 คะแนน',
        gameOverMsg: 'จบเกม! โดนระเบิด'
      },
      en: {
        score: 'Score:',
        time: 'Time:',
        exit: 'Exit',
        gameOverBomb: 'Oops! Hit a bomb! -10 Points',
        gameOverMsg: 'Game Over! You hit a bomb.'
      },
      lao: {
        score: 'ຄະແນນ:',
        time: 'ເວລາ:',
        exit: 'ອອກເກມ',
        gameOverBomb: 'ໂອ້ຍ! ຖືກລະເບີດ! ຫັກ 10 ຄະແນນ',
        gameOverMsg: 'ຈົບເກມ! ຖືກລະເບີດ'
      }
    };
    function setFpsLang() {
      let lang = localStorage.getItem('lang') || 'en';
      if (!['th','en','lao'].includes(lang)) lang = 'en';
      document.getElementById('label-score').textContent = fpsLangData[lang].score;
      document.getElementById('label-time').textContent = fpsLangData[lang].time;
      document.getElementById('fps-exit-btn').textContent = fpsLangData[lang].exit;
      window.fpsLang = fpsLangData[lang]; // Expose to fps-game.js
    }
    document.addEventListener('DOMContentLoaded', setFpsLang);
  </script>
</body>
</html>
