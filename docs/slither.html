<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slither Pro</title>
  <style>
        @media (max-width: 600px) {
          #slither-board {
            width: min(80vw,70vh) !important;
            height: min(80vw,70vh) !important;
            max-width: 100vw !important;
            max-height: 100vh !important;
            grid-template-columns: repeat(30, 1fr) !important;
            grid-template-rows: repeat(30, 1fr) !important;
            gap: 1px !important;
          }
          .slither-cell {
            width: 100% !important;
            height: 100% !important;
            min-width: 0 !important;
            min-height: 0 !important;
          }
          .slither-btn {
            font-size: 1.1rem !important;
            padding: 0.7rem 1.2rem !important;
            min-width: 80px !important;
          }
        }
    body {
      background: #181818;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
    }
    .slither-title {
      font-size: 2.2em;
      margin-top: 32px;
      color: #00ff99;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00ff99;
    }
    #slither-board {
      display: grid;
      grid-template-columns: repeat(30, 16px);
      grid-template-rows: repeat(30, 16px);
      gap: 1px;
      margin: 32px auto;
      background: #222;
      border: 4px solid #00ff99;
      box-shadow: 0 0 24px #00ff99;
      width: 500px;
      height: 500px;
    }
    .slither-cell {
      width: 16px;
      height: 16px;
      background: #222;
      border-radius: 3px;
    }
    .slither-head {
      background: #fff700;
      border-radius: 50%;
      box-shadow: 0 0 8px #fff700;
    }
    .slither-body {
      background: #ffe066;
      border-radius: 50%;
    }
    .slither-bot-head {
      background: #00eaff;
      border-radius: 50%;
      box-shadow: 0 0 8px #00eaff;
    }
    .slither-bot-body {
      background: #7eeeff;
      border-radius: 50%;
    }
    .slither-food {
      background: #ff4081;
      border-radius: 50%;
      box-shadow: 0 0 6px #ff4081;
    }
    .slither-btn {
      margin-top: 16px;
      padding: 10px 32px;
      font-size: 1.1em;
      background: linear-gradient(90deg,#00ff99,#fff700);
      color: #222;
      border: none;
      border-radius: 8px;
      box-shadow: 0 0 8px #00ff99;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .slither-btn:hover {
      background: linear-gradient(90deg,#fff700,#00ff99);
    }
    #slither-exit-btn {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 20;
      padding: 8px 16px;
      background: #ff4444;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-weight: bold;
      font-size: 1rem;
    }
  </style>
</head>
<body>
  <a id="slither-exit-btn" href="index.html">Exit</a>
  <div class="slither-title" id="slither-title">Slither Pro</div>
  <div style="margin-bottom:8px; font-size: 1.2rem;"><span id="label-score">Score:</span> <span id="slither-score">0</span></div>
  <div id="slither-board"></div>
    <div class="slither-arrow-btns" style="display:flex;flex-direction:column;align-items:center;margin:1.2rem 0 0 0;gap:0.3rem;">
      <div style="display:flex;justify-content:center;gap:8px;">
        <button class="slither-btn" id="slither-up">▲</button>
      </div>
      <div style="display:flex;justify-content:center;gap:8px;">
        <button class="slither-btn" id="slither-left">◀</button>
        <button class="slither-btn" id="slither-down">▼</button>
        <button class="slither-btn" id="slither-right">▶</button>
      </div>
    </div>
  <button class="slither-btn" id="start-slither-btn">Start Game</button>
  <script src="js/slither.js"></script>
  <script>
    // ปุ่มควบคุมทิศทางสำหรับมือถือ
    document.getElementById('slither-up').onclick = function() {
      window.setSlitherDirection && window.setSlitherDirection('up');
    };
    document.getElementById('slither-down').onclick = function() {
      window.setSlitherDirection && window.setSlitherDirection('down');
    };
    document.getElementById('slither-left').onclick = function() {
      window.setSlitherDirection && window.setSlitherDirection('left');
    };
    document.getElementById('slither-right').onclick = function() {
      window.setSlitherDirection && window.setSlitherDirection('right');
    };

    const slitherLangData = {
      th: {
        title: 'เกมงู',
        score: 'คะแนน:',
        start: 'เริ่มเกม',
        exit: 'ออกเกม'
      },
      en: {
        title: 'Snake Game',
        score: 'Score:',
        start: 'Start Game',
        exit: 'Exit'
      },
      lao: {
        title: 'ເກມງູ',
        score: 'ຄະແນນ:',
        start: 'ເລີ່ມເກມ',
        exit: 'ອອກເກມ'
      }
    };

    function setSlitherLang() {
      let lang = localStorage.getItem('lang') || 'en';
      if (!['th','en','lao'].includes(lang)) lang = 'en';
      
      document.getElementById('slither-title').textContent = slitherLangData[lang].title;
      document.getElementById('label-score').textContent = slitherLangData[lang].score;
      document.getElementById('start-slither-btn').textContent = slitherLangData[lang].start;
      document.getElementById('slither-exit-btn').textContent = slitherLangData[lang].exit;
    }
    
    document.addEventListener('DOMContentLoaded', setSlitherLang);
  </script>
</body>
</html>
