<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Snake Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #222; }
    .snake-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 2rem;
    }
    #snake-board {
      background: #111;
      border: 4px solid #4caf50;
      border-radius: 16px;
      width: 440px;
      height: 440px;
      display: grid;
      grid-template-rows: repeat(21, 20px);
      grid-template-columns: repeat(21, 20px);
      gap: 1px;
      margin-bottom: 1.2rem;
      box-shadow: 0 4px 24px #4caf5044;
    }
    .snake-cell {
      width: 20px;
      height: 20px;
      background: #222;
      border-radius: 3px;
      position: relative;
    }
    .snake-head { background: #4caf50; border-radius: 50%; }
    .snake-body { background: #81c784; border-radius: 50%; }
    .snake-food { background: #ffeb3b; border-radius: 50%; }
    .snake-score {
      color: #4caf50;
      font-size: 1.2rem;
      margin: 1rem 0;
      font-weight: bold;
    }
    #start-snake-btn {
      font-size: 1.1rem;
      padding: 0.6rem 1.8rem;
      border-radius: 12px;
      background: linear-gradient(90deg,#4caf50 60%,#fffde7 100%);
      color: #222;
      border: none;
      font-weight: bold;
      margin-bottom: 1.2rem;
      cursor: pointer;
      box-shadow: 0 2px 8px #4caf5044;
      transition: background 0.2s, color 0.2s, transform 0.1s;
    }
    #start-snake-btn:hover, #start-snake-btn:active {
      background: linear-gradient(90deg,#fffde7 60%,#4caf50 100%);
      color: #222;
      transform: scale(0.98);
    }
  </style>
</head>
<body>
  <div class="snake-container">
    <h2 style="color:#4caf50;">Snake Pro</h2>
    <div class="snake-score">คะแนน: <span id="snake-score">0</span> | สูงสุด: <span id="snake-highscore">0</span></div>
    <button id="start-snake-btn">เริ่มเกม</button>
    <div style="display:flex;flex-direction:column;align-items:center;margin-top:1.2rem;">
      <div id="snake-board"></div>
      <div style="margin-top:1.2rem;display:flex;gap:12px;justify-content:center;">
        <button id="theme-snake-btn" style="font-size:1rem;padding:0.5rem 1.5rem;border-radius:10px;background:#333;color:#fff;border:none;box-shadow:0 2px 8px #4caf5044;cursor:pointer;">เปลี่ยนธีม</button>
        <button id="pause-snake-btn" style="font-size:1rem;padding:0.5rem 1.5rem;border-radius:10px;background:#333;color:#fff;border:none;box-shadow:0 2px 8px #4caf5044;cursor:pointer;">หยุด</button>
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;margin-top:1.2rem;">
        <div style="display:flex;justify-content:center;margin-bottom:1rem;">
          <button id="arrow-up" style="width:40px;height:40px;margin:2px;font-size:1.5rem;">▲</button>
        </div>
        <div style="display:flex;justify-content:center;margin-bottom:1rem;">
          <button id="arrow-left" style="width:40px;height:40px;margin:2px;font-size:1.5rem;">◀</button>
          <button id="arrow-down" style="width:40px;height:40px;margin:2px;font-size:1.5rem;">▼</button>
          <button id="arrow-right" style="width:40px;height:40px;margin:2px;font-size:1.5rem;">▶</button>
        </div>
      </div>
    </div>
  </div>
  <script src="js/snake.js"></script>
  <script>
    let snakeTheme = 0;
    const themes = [
      { head:'#4caf50', body:'#81c784', food:'#ffeb3b', bg:'#111' },
      { head:'#1976d2', body:'#90caf9', food:'#ff4081', bg:'#222' },
      { head:'#ffd600', body:'#fffde7', food:'#4caf50', bg:'#333' }
    ];
    document.getElementById('theme-snake-btn').onclick = function() {
      snakeTheme = (snakeTheme+1)%themes.length;
      document.body.style.background = themes[snakeTheme].bg;
      window.setSnakeTheme && setSnakeTheme(snakeTheme);
    };
    // เรียกใช้ใน js/snake.js
    window.setSnakeTheme = function(themeIdx) {
      const t = themes[themeIdx];
      document.querySelectorAll('.snake-head').forEach(e=>e.style.background=t.head);
      document.querySelectorAll('.snake-body').forEach(e=>e.style.background=t.body);
      document.querySelectorAll('.snake-food').forEach(e=>e.style.background=t.food);
    };
    let paused = false;
    document.getElementById('pause-snake-btn').onclick = function() {
      paused = !paused;
      window.setSnakePaused && window.setSnakePaused(paused);
      this.innerText = paused ? 'เล่นต่อ' : 'หยุด';
    };
    window.setSnakePaused = function(p) {
      if(p) {
        window.clearInterval(window.snakeIntervalId);
      } else {
        window.snakeIntervalId = setInterval(()=>{
          if(window.moveSnake) window.moveSnake();
        }, window.snakeIntervalSpeed||120);
      }
    };
    document.getElementById('arrow-up').onclick = ()=> window.setSnakeDirection && window.setSnakeDirection('up');
    document.getElementById('arrow-down').onclick = ()=> window.setSnakeDirection && window.setSnakeDirection('down');
    document.getElementById('arrow-left').onclick = ()=> window.setSnakeDirection && window.setSnakeDirection('left');
    document.getElementById('arrow-right').onclick = ()=> window.setSnakeDirection && window.setSnakeDirection('right');
  </script>
</body>
</html>
