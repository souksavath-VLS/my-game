<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกมซ่อนหา</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .hide-seek-area {
      display: flex;
      justify-content: center;
      gap: 18px;
      margin: 32px 0 16px 0;
    }
    .hide-seek-box {
      width: 70px;
      height: 70px;
      background: #fffbe7;
      border: 2.5px solid #ffd54f;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      font-weight: bold;
      color: #1976d2;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255,213,79,0.10);
      transition: background 0.18s, color 0.18s;
      user-select: none;
    }
    .hide-seek-box:active {
      background: #ffe082;
      color: #388e3c;
    }
  </style>
</head>
<body>
  <div class="header">เกมซ่อนหา</div>
  <div class="container py-4">
    <div class="text-center mt-3">
      <button onclick="window.location.href='index.html'" class="menu-btn" style="margin-bottom:12px;">ออกเกม</button>
      <button id="restartBtn" class="menu-btn" style="margin-left:8px;">เริ่มใหม่</button>
    </div>
    <div id="hide-seek-game-timer" class="text-center mt-2" style="font-size:1.2rem;color:#4caf50;"></div>
    <div id="hide-seek-game-area" class="hide-seek-area"></div>
    <div id="hide-seek-game-result" class="text-center mt-4" style="font-size: 1.2rem;"></div>
  </div>
  <script src="js/hide-and-seek-game.js"></script>
  <script>
    document.getElementById('restartBtn').onclick = function() { startHideSeekGame(); };
    window.onload = function() { startHideSeekGame(); };
  </script>
</body>
</html>
