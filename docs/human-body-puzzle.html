<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>Human Body Puzzle</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .container { max-width: 1100px; margin: 0 auto; padding: 0 16px; }
    .piece-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; margin-top: 32px; }
    .body-piece { border: 3px solid #2196f3; border-radius: 8px; padding: 12px 24px; font-size: 1.1rem; background: #fff; cursor: grab; font-weight: bold; min-width: 120px; margin-bottom: 12px; }
    .drop-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; margin-top: 60px; max-width: 700px; margin-left: auto; margin-right: auto; }
    .drop-row-center { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 340px; margin: 0 auto; }
    .drop-zone { border: 3px solid #f44336; border-radius: 8px; padding: 16px 32px; min-width: 120px; min-height: 32px; margin: 8px 0; text-align: center; font-size: 1.1rem; background: #fff; font-weight: bold; transition: background 0.2s; }
    .drop-zone.active { background: #c8e6c9; }
    .drop-zone.filled { background: #c8e6c9; color: #1976d2; }
    .stats { text-align: center; margin: 18px 0 0 0; font-size: 1.1rem; color: #1976d2; }
    .tts-btn { margin-left: 8px; background: #fffbe7; border: 1.5px solid #1976d2; border-radius: 6px; color: #1976d2; font-size: 1.1rem; padding: 2px 10px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center;">Human Body Puzzle</h1>
    <div class="piece-row" id="piece-row"></div>
    <div class="drop-row">
      <div class="drop-zone" id="drop-ear1">drop zone ear1</div>
      <div class="drop-zone" id="drop-head">drop zone head</div>
      <div class="drop-zone" id="drop-ear2">drop zone ear2</div>
    </div>
    <div class="drop-row-center">
      <div class="drop-zone" id="drop-eyes">drop zone eyes</div>
      <div class="drop-zone" id="drop-nose">drop zone nose</div>
      <div class="drop-zone" id="drop-mouth">drop zone mouth</div>
    </div>
    <div class="stats">
      <span id="timer">เวลา: 0 วินาที</span> |
      <span id="correct">ถูก: 0</span>
      <span id="wrong" style="margin-left: 12px;">ผิด: 0</span>
    </div>
    <div id="result" style="text-align:center;font-size:1.2rem;color:#388e3c;margin-top:10px;"></div>
      <div id="wrong-result" style="text-align:center;font-size:1.1rem;color:#d32f2f;margin-top:6px;"></div>
    <div style="text-align:center;margin-top:18px;">
      <button onclick="window.location.href='index.html'" style="padding:8px 18px;font-size:1.1rem;border-radius:8px;background:#fffbe7;color:#1976d2;border:1.5px solid #1976d2;">ย้อนกลับหน้าแรก</button>
      <button id="restart-btn" style="padding:8px 18px;font-size:1.1rem;border-radius:8px;background:#fffbe7;color:#1976d2;border:1.5px solid #1976d2;">เริ่มใหม่</button>
    </div>
  </div>
  <script src="js/human-body-puzzle.js"></script>
</body>
</html>
