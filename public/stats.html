<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>โหมดผู้ปกครอง - สถิติและพัฒนาการ</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    #stats-summary > div {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 1.2rem 1rem;
      text-align: left;
      font-size: 1.1rem;
      color: #333;
      margin-bottom: 0;
    }
    #stats-summary b {
      color: #1976d2;
    }
    #stats-summary details {
      margin-top: 0.7rem;
    }
    #stats-summary ul {
      margin: 0.5rem 0 0 0;
      padding-left: 1.2rem;
      color: #555;
      font-size: 1rem;
    }
    #stats-summary li {
      margin-bottom: 0.3rem;
    }
    .header {
      font-size: 1.5rem;
      font-weight: bold;
      letter-spacing: 0.5px;
    }
    @media (max-width: 600px) {
      .container { padding: 0.5rem; }
      #stats-summary > div { padding: 0.7rem 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="header" style="background:#1976d2;color:#fff;border-radius:12px 12px 0 0;padding:1.2rem 0;box-shadow:0 2px 8px rgba(25,118,210,0.12);">โหมดผู้ปกครอง - สถิติและพัฒนาการ</div>
  <div class="container py-4" style="max-width:600px;margin:auto;">
    <div id="game-menu" style="display:flex;flex-direction:column;gap:1.5rem;margin-bottom:2.5rem;align-items:center;">
      <button class="menu-btn" style="width:90%;max-width:340px;padding:1.2rem 0;font-size:1.2rem;background:#fff;color:#1976d2;border:2px solid #1976d2;border-radius:10px;font-weight:bold;box-shadow:0 2px 8px rgba(25,118,210,0.08);" onclick="showStats('memory')">เกมจับคู่ภาพ</button>
      <button class="menu-btn" style="width:90%;max-width:340px;padding:1.2rem 0;font-size:1.2rem;background:#fff;color:#f57c00;border:2px solid #f57c00;border-radius:10px;font-weight:bold;box-shadow:0 2px 8px rgba(245,124,0,0.08);" onclick="showStats('fruit')">เกมนับจำนวนผลไม้</button>
      <button class="menu-btn" style="width:90%;max-width:340px;padding:1.2rem 0;font-size:1.2rem;background:#fff;color:#1976d2;border:2px solid #1976d2;border-radius:10px;font-weight:bold;box-shadow:0 2px 8px rgba(25,118,210,0.08);" onclick="showStats('drawnumber')">เกมลากเส้นตัวเลข 1-10</button>
      <button class="menu-btn" style="width:90%;max-width:340px;padding:1.2rem 0;font-size:1.2rem;background:#fff;color:#388e3c;border:2px solid #388e3c;border-radius:10px;font-weight:bold;box-shadow:0 2px 8px rgba(56,142,60,0.08);" onclick="showStats('color')">เกมเลือกสี</button>
      <button class="menu-btn" style="width:90%;max-width:340px;padding:1.2rem 0;font-size:1.2rem;background:#fff;color:#f57c00;border:2px solid #f57c00;border-radius:10px;font-weight:bold;box-shadow:0 2px 8px rgba(245,124,0,0.08);" onclick="showStats('sound')">เกมฟังเสียง</button>
    </div>
    <div id="stats-summary" style="display:none;flex-direction:column;gap:2rem;"></div>
    <div id="chart-container" style="display:none;background:#fff;border-radius:12px;padding:1.2rem 1rem;box-shadow:0 2px 12px rgba(0,0,0,0.08);margin-bottom:2rem;">
      <canvas id="statsChart" style="max-width:400px;margin:0 auto;"></canvas>
    </div>
    <div class="text-center mt-4">
      <button onclick="window.location.href='index.html'" class="menu-btn" style="background:#1976d2;color:#fff;border-radius:8px;box-shadow:0 2px 8px rgba(25,118,210,0.12);font-weight:bold;">กลับหน้าแรก</button>
      <button id="backToMenuBtn" onclick="backToMenu()" class="menu-btn" style="display:none;margin-left:1rem;background:#fff;color:#1976d2;border:2px solid #1976d2;border-radius:8px;font-weight:bold;">ย้อนกลับ</button>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/stats.js"></script>
</body>
</html>
