<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกมเดือนในปี</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .months-calendar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 18px;
      margin: 32px 0 16px 0;
      justify-items: center;
    }
    .months-calendar-cell {
      width: 120px;
      height: 48px;
      background: #fffbe7;
      border: 2px solid #ffd54f;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      font-weight: bold;
      color: #1976d2;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(255,213,79,0.10);
      transition: background 0.18s, color 0.18s;
    }
    .months-calendar-cell:active {
      background: #ffe082;
      color: #388e3c;
    }
  </style>
</head>
<body>
  <div class="header">เกมเดือนในปี</div>
  <div class="container py-4">
    <div class="text-center mt-3">
      <button onclick="window.location.href='index.html'" class="menu-btn" style="margin-bottom:12px;">ออกเกม</button>
      <button id="restartBtn" class="menu-btn" style="margin-left:8px;">เริ่มใหม่</button>
    </div>
    <div id="months-game-timer" class="text-center mt-2" style="font-size:1.2rem;color:#4caf50;"></div>
    <div id="months-game-calendar" class="months-calendar"></div>
    <div id="months-game-result" class="text-center mt-4" style="font-size: 1.2rem;"></div>
  </div>
  <script src="js/months-game.js"></script>
  <script>
    document.getElementById('restartBtn').onclick = function() { startMonthsGame(); };
    window.onload = function() { startMonthsGame(); };
  </script>
</body>
</html>
