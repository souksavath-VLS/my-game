<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกม Match Icon</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="header">เกม Match Icon</div>
  <div class="container py-4">
    <div id="match-icon-timer" class="text-center mb-2" style="font-size:1.1rem;color:#888;"></div>
    <div id="match-icon-question" class="text-center mb-4" style="font-size:2rem;"></div>
    <div id="match-icon-board" class="d-flex flex-wrap justify-content-center mb-4"></div>
    <div id="match-icon-result" class="text-center mt-3" style="font-size:1.5rem;color:#ff9800;"></div>
    <div class="text-center mt-4">
      <button id="restartMatchIconBtn" class="menu-btn">เริ่มใหม่</button>
      <button onclick="window.location.href='index.html'" class="menu-btn" style="background:#ffebee;color:#e53935;">ออกเกม</button>
    </div>
  </div>
  <audio id="matchIconCorrectSound" src="assets/sound/sound-game/correct.wav"></audio>
  <audio id="matchIconWrongSound" src="assets/sound/sound-game/wrong.wav"></audio>
  <audio id="matchIconWinSound" src="assets/sound/sound-game/win.wav"></audio>
  <script src="js/match-icon-game.js"></script>
</body>
</html>
