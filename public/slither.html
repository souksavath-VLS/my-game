<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slither Pro</title>
  <style>
    body {
      background: #181818;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
    }
    .slither-title {
      font-size: 2.2em;
      margin-top: 32px;
      color: #00ff99;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00ff99;
    }
    #slither-board {
      display: grid;
      grid-template-columns: repeat(30, 16px);
      grid-template-rows: repeat(30, 16px);
      gap: 1px;
      margin: 32px auto;
      background: #222;
      border: 4px solid #00ff99;
      box-shadow: 0 0 24px #00ff99;
      width: 500px;
      height: 500px;
    }
    .slither-cell {
      width: 16px;
      height: 16px;
      background: #222;
      border-radius: 3px;
    }
    .slither-head {
      background: #fff700;
      border-radius: 50%;
      box-shadow: 0 0 8px #fff700;
    }
    .slither-body {
      background: #ffe066;
      border-radius: 50%;
    }
    .slither-bot-head {
      background: #00eaff;
      border-radius: 50%;
      box-shadow: 0 0 8px #00eaff;
    }
    .slither-bot-body {
      background: #7eeeff;
      border-radius: 50%;
    }
    .slither-food {
      background: #ff4081;
      border-radius: 50%;
      box-shadow: 0 0 6px #ff4081;
    }
    .slither-btn {
      margin-top: 16px;
      padding: 10px 32px;
      font-size: 1.1em;
      background: linear-gradient(90deg,#00ff99,#fff700);
      color: #222;
      border: none;
      border-radius: 8px;
      box-shadow: 0 0 8px #00ff99;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .slither-btn:hover {
      background: linear-gradient(90deg,#fff700,#00ff99);
    }
  </style>
</head>
<body>
  <div class="slither-title">Slither Pro</div>
  <div style="margin-bottom:8px;">Score: <span id="slither-score">0</span></div>
  <div id="slither-board"></div>
  <button class="slither-btn" id="start-slither-btn">Start Game</button>
  <script src="js/slither.js"></script>
</body>
</html>
