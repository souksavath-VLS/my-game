<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกมรดน้ำต้นไม้</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tree-game-tree {
      width: 120px;
      height: 160px;
      margin: 32px auto;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }
    .tree-game-water-btn {
      background: #42a5f5;
      color: #fff;
      border: 2px solid #1976d2;
      border-radius: 10px;
      font-size: 1.2rem;
      font-weight: bold;
      padding: 0.8rem 1.5rem;
      margin: 0.5rem;
      box-shadow: 0 2px 8px rgba(66,165,245,0.08);
      cursor: pointer;
      transition: background 0.18s, color 0.18s, box-shadow 0.18s;
    }
    .tree-game-water-btn:hover {
      background: #1976d2;
      color: #fff;
      box-shadow: 0 4px 16px rgba(66,165,245,0.12);
    }
  </style>
</head>
<body>
  <div class="header">เกมรดน้ำต้นไม้</div>
  <div class="container py-4">
    <div class="text-center mt-3">
      <button onclick="window.location.href='index.html'" class="menu-btn" style="margin-bottom:12px;">ออกเกม</button>
      <button id="restartBtn" class="menu-btn" style="margin-left:8px;">เริ่มใหม่</button>
    </div>
    <div id="tree-game-timer" class="text-center mt-2" style="font-size:1.2rem;color:#4caf50;"></div>
    <div id="tree-game-tree" class="tree-game-tree"></div>
    <div class="text-center mt-3">
      <button class="tree-game-water-btn" onclick="tapWater()">💧 รดน้ำ</button>
    </div>
    <div id="tree-game-result" class="text-center mt-4" style="font-size: 1.2rem;"></div>
  </div>
  <script src="js/water-tree-game.js"></script>
  <script>
    document.getElementById('restartBtn').onclick = function() { startWaterTreeGame(); };
    window.onload = function() { startWaterTreeGame(); };
  </script>
</body>
</html>
