<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกมหอคอย</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .tower-area {
      width: 180px;
      min-height: 220px;
      margin: 32px auto;
      background: #fffbe7;
      border-radius: 16px;
      box-shadow: 0 2px 8px rgba(255,213,79,0.10);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding: 16px 0;
    }
    .tower-block {
      width: 120px;
      height: 32px;
      background: #ffb300;
      border-radius: 8px;
      margin: 8px auto;
      box-shadow: 0 2px 8px rgba(255,179,0,0.12);
      cursor: grab;
      transition: background 0.18s, box-shadow 0.18s;
    }
    .tower-block:active {
      background: #ffe082;
      box-shadow: 0 4px 16px rgba(255,179,0,0.18);
    }
  </style>
</head>
<body>
  <div class="header">เกมหอคอย</div>
  <div class="container py-4">
    <div class="text-center mt-3">
      <button onclick="window.location.href='index.html'" class="menu-btn" style="margin-bottom:12px;">ออกเกม</button>
      <button id="restartBtn" class="menu-btn" style="margin-left:8px;">เริ่มใหม่</button>
    </div>
    <div id="tower-game-timer" class="text-center mt-2" style="font-size:1.2rem;color:#4caf50;"></div>
    <div class="tower-area" id="tower-game-stack" ondragover="allowDrop(event)" ondrop="dropBlock(event)"></div>
    <div class="tower-area" id="tower-game-blocks"></div>
    <div id="tower-game-result" class="text-center mt-4" style="font-size: 1.2rem;"></div>
  </div>
  <script src="js/tower-game.js"></script>
  <script>
    document.getElementById('restartBtn').onclick = function() { startTowerGame(); };
    window.onload = function() { startTowerGame(); };
  </script>
</body>
</html>
