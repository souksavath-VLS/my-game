<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Space Invaders Pro</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      text-align: center;
    }
    .spaceinvaders-title {
      font-size: 2.2em;
      margin-top: 32px;
      color: #00eaff;
      letter-spacing: 2px;
      text-shadow: 0 0 8px #00eaff;
    }
    #spaceinvaders-board {
      display: grid;
      grid-template-columns: repeat(20, 24px);
      grid-template-rows: repeat(20, 24px);
      gap: 2px;
      margin: 32px auto;
      background: #222;
      border: 4px solid #00eaff;
      box-shadow: 0 0 24px #00eaff;
      width: 500px;
      height: 500px;
    }
    .spaceinvaders-cell {
      width: 24px;
      height: 24px;
      background: #222;
      border-radius: 4px;
    }
    .spaceinvaders-player {
      width: 100%;
      height: 100%;
      background: #fff700;
      border-radius: 50% 50% 0 0;
      box-shadow: 0 0 8px #fff700;
    }
    .spaceinvader {
      width: 100%;
      height: 100%;
      background: #00eaff;
      border-radius: 6px;
      box-shadow: 0 0 8px #00eaff;
    }
    .spaceinvaders-bullet {
      width: 8px;
      height: 16px;
      background: #fff;
      margin: 0 auto;
      border-radius: 2px;
      box-shadow: 0 0 4px #fff;
    }
    .spaceinvaders-score {
      font-size: 1.2em;
      margin-top: 8px;
      color: #fff700;
      text-shadow: 0 0 4px #fff700;
    }
    .spaceinvaders-btn {
      margin-top: 16px;
      padding: 10px 32px;
      font-size: 1.1em;
      background: linear-gradient(90deg,#00eaff,#fff700);
      color: #222;
      border: none;
      border-radius: 8px;
      box-shadow: 0 0 8px #00eaff;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .spaceinvaders-btn:hover {
      background: linear-gradient(90deg,#fff700,#00eaff);
    }
  </style>
</head>
<body>
  <div class="spaceinvaders-title">Space Invaders Pro</div>
  <div class="spaceinvaders-score">
    Score: <span id="spaceinvaders-score">0</span>
    &nbsp;|&nbsp;
    Time: <span id="spaceinvaders-timer">00:00</span>
  </div>
  <div id="spaceinvaders-board"></div>
  <div style="display:flex;justify-content:center;align-items:center;margin-top:16px;gap:16px;">
    <button class="spaceinvaders-btn" id="left-btn">&#8592; Left</button>
    <button class="spaceinvaders-btn" id="start-spaceinvaders-btn">Start Game</button>
    <button class="spaceinvaders-btn" id="right-btn">Right &#8594;</button>
  </div>
  <script src="js/spaceinvaders.js"></script>
  <script>
    document.getElementById('left-btn').onclick = function() {
      window.movePlayer && window.movePlayer(-1);
    };
    document.getElementById('right-btn').onclick = function() {
      window.movePlayer && window.movePlayer(1);
    };
  </script>
  <script src="js/spaceinvaders.js"></script>
</body>
</html>
