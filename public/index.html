<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>เกมฝึกสมองสำหรับเด็ก 3-5 ปี</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .lang-select { position: absolute; top: 18px; right: 18px; z-index: 10; }
  </style>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#"><i class="fa-solid fa-gamepad"></i> MyGame</a>
      <div class="d-flex">
        <button id="googleLoginBtn" class="btn btn-danger"><i class="fa-brands fa-google"></i> Login </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid">
    <div class="row">
      <div class="col-md-2 sidebar">
        <a href="#"><i class="fa-solid fa-dice"></i> Casino</a>
        <a href="#"><i class="fa-solid fa-futbol"></i> Sports</a>
        <a href="#"><i class="fa-solid fa-ticket"></i> Lottery</a>
        <a href="#"><i class="fa-solid fa-gift"></i> Promotions</a>
        <a href="#"><i class="fa-solid fa-users"></i> VIP Club</a>
      </div>
      <div class="col-md-10">
        <div class="banner-wrapper mb-3">
          <img id="bannerImage" src="https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80" alt="Banner" class="img-fluid w-100" style="max-height:300px;object-fit:cover;border-radius:20px;">
        </div>
        <div class="content" id="mainContent">
          <h2 class="text-center">Welcome to My Game Platform</h2>
          <p class="text-center">Click Login or Sign Up to continue.</p>
          <div class="text-center mt-4">
            <button id="googleLoginBtn" class="btn btn-danger"><i class="fa-brands fa-google"></i> Login with Google</button>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script>
    document.getElementById('help-btn').onclick = function() {
      document.getElementById('help-modal').style.display = 'flex';
    };
  </script>
  <script src="js/script.js"></script>
  <script>
    // ภาษา: ไทย/อังกฤษ (ตัวอย่างเปลี่ยนเฉพาะข้อความหลัก)
    const langData = {
      th: {
        header: 'เกมฝึกสมองสำหรับเด็ก 3-5 ปี',
        btnMemory: 'เกมจับคู่ภาพ',
        btnColor: 'เกมเลือกสี',
        btnSound: 'เกมฟังเสียง',
        stats: 'ดูสถิติ/โหมดผู้ปกครอง',
        help: '❓ วิธีเล่น/ช่วยเหลือ'
      },
      en: {
        header: 'Brain Games for Kids 3-5',
        btnMemory: 'Memory Match',
        btnColor: 'Color Picker',
        btnSound: 'Sound Quiz',
        stats: 'Stats / Parent Mode',
        help: '❓ Help / How to Play'
      }
    };
    document.getElementById('lang-select').onchange = function() {
      const l = this.value;
      document.querySelector('.header').innerText = langData[l].header;
      document.getElementById('btn-memory').innerText = langData[l].btnMemory;
      document.getElementById('btn-color').innerText = langData[l].btnColor;
      document.getElementById('btn-sound').innerText = langData[l].btnSound;
      document.getElementById('stats-link').innerText = langData[l].stats;
      document.getElementById('help-btn').innerText = langData[l].help;
    };
  </script>
</body>
</html>
