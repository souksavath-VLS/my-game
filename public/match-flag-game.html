<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Match Flag Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="flag-card-main">
    <div class="flag-header">Match Flag Game</div>
    <div class="flag-board" id="match-flag-board">
      <div class="flag-row" id="flag-row"></div>
      <div class="name-row" id="name-row"></div>
    </div>
    <div style="margin: 18px 0; display: flex; gap: 12px; justify-content:center;">
      <button id="backBtn" class="flag-btn">ย้อนกลับหน้าแรก</button>
      <button id="nextBtn" class="flag-btn">สุ่มใหม่</button>
    </div>
    <div id="timer"></div>
    <div id="result"></div>
  </div>
  <script src="js/country-list.js"></script>
  <script src="js/match-flag-game.js"></script>
</body>
</html>
  <style>
    body {
      background: linear-gradient(135deg, #e0e7ff 0%, #fffbe7 100%);
      min-height: 100vh;
      margin: 0;
      font-family: 'Kanit', 'Prompt', 'Noto Sans Thai', Arial, sans-serif;
    }
    .flag-card-main {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 6px 32px 0 rgba(60,60,120,0.10), 0 1.5px 6px 0 rgba(60,60,120,0.08);
      max-width: 520px;
      margin: 40px auto 0 auto;
      padding: 32px 24px 28px 24px;
      position: relative;
    }
    .flag-header {
      background: linear-gradient(90deg, #4f8cff 0%, #7f53ac 100%);
      color: #fff;
      font-size: 2.1rem;
      font-weight: bold;
      border-radius: 14px 14px 0 0;
      padding: 18px 0 14px 0;
      text-align: center;
      letter-spacing: 1px;
      margin-bottom: 18px;
      box-shadow: 0 2px 8px 0 rgba(79,140,255,0.08);
    }
    .flag-board {
      margin-bottom: 24px;
    }
    .flag-row, .name-row {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .flag-box {
      width: 90px;
      height: 70px;
      border: 2px solid #1976d2;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.3s;
      position: relative;
      margin-bottom: 8px;
      box-shadow: 0 2px 8px rgba(25,118,210,0.10);
    }
    .flag-box.matched {
      background: #c8e6c9 !important;
      border-color: #388e3c;
    }
    .flag-box img {
      width: 70px;
      height: 48px;
      object-fit: contain;
      border-radius: 4px;
      box-shadow: 0 1px 4px rgba(60,60,120,0.08);
    }
    .flag-btn {
      background: linear-gradient(90deg, #4f8cff 0%, #7f53ac 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 22px;
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 8px 12px 0;
      cursor: pointer;
      box-shadow: 0 1.5px 6px 0 rgba(60,60,120,0.07);
      transition: background 0.2s, box-shadow 0.2s;
    }
    .flag-btn:hover {
      background: linear-gradient(90deg, #7f53ac 0%, #4f8cff 100%);
      box-shadow: 0 4px 16px 0 rgba(127,83,172,0.13);
    }
    #result {
      font-size: 1.3rem;
      font-weight: bold;
      color: #ff9800;
      margin-top: 18px;
      min-height: 32px;
      text-align: center;
    }
    #timer {
      font-size: 1.2rem;
      color: #1976d2;
      margin-bottom: 10px;
      font-weight: 500;
      text-align: center;
    }
    @media (max-width: 600px) {
      .flag-card-main { padding: 16px 4px 18px 4px; }
      .flag-header { font-size: 1.3rem; padding: 12px 0 8px 0; }
      .flag-box { width: 60px; height: 40px; }
      .flag-box img { width: 40px; height: 24px; }
    }
  </style>
